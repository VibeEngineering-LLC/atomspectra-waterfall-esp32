<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>AtomSpectra Waterfall Viewer (.n42 / .aswf)</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font:13px/1.4 system-ui,Segoe UI,sans-serif; background:#111; color:#ddd; }
  header { padding:8px 12px; background:#1a1a1a; border-bottom:1px solid #333; position:sticky; top:0; z-index:5; }
  header .row { display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  label { display:inline-flex; gap:5px; align-items:center; white-space:nowrap; }
  input[type=number]{ width:64px; background:#222; color:#ddd; border:1px solid #444; border-radius:4px; padding:2px 4px; }
  input[type=range]{ width:120px; }
  button{ background:#2a2a2a; color:#ddd; border:1px solid #555; border-radius:4px; padding:3px 9px; cursor:pointer; }
  button:hover{ background:#383838; }
  #drop{ margin:6px 0; padding:6px 10px; border:1px dashed #555; border-radius:6px; color:#999; }
  #drop.hl{ border-color:#6cf; color:#cef; }
  #meta{ color:#9ad; font-size:12px; }
  #wrap{ overflow:auto; max-height:calc(100vh - 150px); background:#000; position:relative; }
  #cv{ image-rendering:pixelated; display:block; }
  #tip{ position:fixed; pointer-events:none; background:#000d; border:1px solid #555; border-radius:5px;
        padding:4px 7px; font-size:12px; display:none; z-index:10; white-space:pre; }
  #legend{ display:inline-block; height:12px; width:140px; vertical-align:middle;
           background:linear-gradient(90deg,#440154,#414487,#2a788e,#22a884,#7ad151,#fde725); border:1px solid #444; }
  .sep{ width:1px; height:20px; background:#444; }
</style>
</head>
<body>
<header>
  <div class="row">
    <strong>Водопад .n42 / .aswf</strong>
    <button id="pick">Открыть файл…</button>
    <input id="file" type="file" accept=".n42,.xml,.aswf,.bin" style="display:none">
    <span id="meta">файл не загружен</span>
  </div>
  <div id="drop">Перетащи сюда файл <code>.n42</code> или <code>.aswf</code> (или нажми «Открыть файл…»)</div>
  <div class="row">
    <label>Канал от <input id="chMin" type="number" value="0" min="0"></label>
    <label>до <input id="chMax" type="number" value="8191" min="1"></label>
    <button id="full">Весь диапазон</button>
    <span class="sep"></span>
    <label>Детализация (колонок) <input id="cols" type="number" value="1024" min="64" max="8192" step="64"></label>
    <span class="sep"></span>
    <label>Высота строки <input id="rowH" type="range" min="1" max="12" value="3"></label>
    <label>Ширина бина <input id="colW" type="range" min="1" max="6" value="1"></label>
    <span class="sep"></span>
    <label><input id="log" type="checkbox" checked> log</label>
    <label>Контраст <input id="gain" type="range" min="0.2" max="6" step="0.1" value="1.4"></label>
    <span class="sep"></span>
    <span id="legend"></span> <span style="color:#888">мало → много</span>
  </div>
</header>

<div id="wrap"><canvas id="cv" width="100" height="40"></canvas></div>
<div id="tip"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const NS = "*";
let ST = null;   // {channels, rows:[{start,real,counts:Uint32Array}], calib:[a0,a1,a2]|null}
let GRID = null; // {agg:Float32Array, R, C, maxv, chMin, chMax}
const off = document.createElement("canvas");
const offctx = off.getContext("2d");
const cv = $("cv"), ctx = cv.getContext("2d");
const VIR = [[68,1,84],[65,68,135],[42,120,142],[34,168,132],[122,209,81],[253,231,37]];

function lerp(a,b,t){ return a+(b-a)*t; }
function viridis(t){
  t = Math.max(0,Math.min(1,t));
  const x = t*(VIR.length-1), i = Math.floor(x), f = x-i;
  const a = VIR[i], b = VIR[Math.min(i+1,VIR.length-1)];
  return [lerp(a[0],b[0],f)|0, lerp(a[1],b[1],f)|0, lerp(a[2],b[2],f)|0];
}

function decodeCD(text, comp, channels){
  const toks = text.trim().split(/\s+/);
  const out = new Uint32Array(channels);
  let i=0,k=0;
  const counted = comp && comp.toLowerCase().indexOf("countedzero")>=0;
  if(counted){
    while(i<toks.length && k<channels){
      const v = +toks[i++];
      if(v===0){ k += (+toks[i++]||0); }
      else { out[k++]=v; }
    }
  } else {
    while(i<toks.length && k<channels){ out[k++]= +toks[i++]; }
  }
  return out;
}

function parseN42(text){
  const xml = new DOMParser().parseFromString(text, "application/xml");
  if(xml.getElementsByTagName("parsererror").length) throw new Error("XML не распознан");
  const meas = xml.getElementsByTagNameNS(NS,"RadMeasurement");
  if(!meas.length) throw new Error("нет RadMeasurement — это не N42 водопад?");
  let channels = 0;
  const rows = [];
  for(const m of meas){
    const sp = m.getElementsByTagNameNS(NS,"Spectrum")[0];
    if(!sp) continue;
    const cd = sp.getElementsByTagNameNS(NS,"ChannelData")[0];
    if(!cd) continue;
    const comp = cd.getAttribute("compressionCode") || "";
    const tmp = cd.textContent.trim().split(/\s+/);
    let len = comp.toLowerCase().indexOf("countedzero")>=0 ? 0 : tmp.length;
    if(len===0){ for(let i=0;i<tmp.length;){ const v=+tmp[i++]; if(v===0) len+=(+tmp[i++]||0); else len++; } }
    channels = Math.max(channels, len);
    const st = m.getElementsByTagNameNS(NS,"StartDateTime")[0];
    const rt = m.getElementsByTagNameNS(NS,"RealTimeDuration")[0];
    rows.push({ comp, raw: cd.textContent, start: st?st.textContent:"", real: rt?rt.textContent:"" });
  }
  if(!channels) throw new Error("ChannelData пуст");
  for(const r of rows){ r.counts = decodeCD(r.raw, r.comp, channels); r.raw=null; }
  let calib = null;
  const ec = xml.getElementsByTagNameNS(NS,"CoefficientValues")[0];
  if(ec){ const c = ec.textContent.trim().split(/\s+/).map(Number); if(c.some(x=>Math.abs(x)>0)) calib=c; }
  return { channels, rows, calib };
}

// === .aswf parser ===
// Layout: "ASWF"(4) | header_len:u32 LE | JSON header (UTF-8, space-padded) | payload (rows × channels × uint16 LE)
function parseAswf(buf){
  const u8=new Uint8Array(buf), dv=new DataView(buf);
  if(buf.byteLength<12) throw new Error(".aswf слишком короткий: "+buf.byteLength+" байт");
  if(!(u8[0]===0x41&&u8[1]===0x53&&u8[2]===0x57&&u8[3]===0x46))
    throw new Error("не .aswf: магия "+[u8[0],u8[1],u8[2],u8[3]].map(x=>x.toString(16)).join(" ")+" ≠ ASWF");
  const hdrLen=dv.getUint32(4,true);
  if(hdrLen<2||hdrLen>1024*1024) throw new Error("шапка подозрительной длины: "+hdrLen);
  const hdrBytes=u8.subarray(8,8+hdrLen);
  let hdr;
  try{ hdr=JSON.parse(new TextDecoder("utf-8").decode(hdrBytes).trim()); }
  catch(e){ throw new Error("шапка не JSON: "+e.message); }
  const channels=hdr.channels|0;
  if(channels<1||channels>65536) throw new Error("channels из шапки = "+hdr.channels);
  const interval=+hdr.interval_sec||0;
  const startedAt=+hdr.started_at||0;          // epoch секунды
  const calib=Array.isArray(hdr.calibration)&&hdr.calibration.some(x=>Math.abs(x)>0)?hdr.calibration.map(Number):null;
  const payloadOff=8+hdrLen;
  const payloadBytes=buf.byteLength-payloadOff;
  const rowBytes=channels*2;
  let nRows=Math.floor(payloadBytes/rowBytes);
  const declared=hdr.saved_rows|0;
  if(declared>0&&declared<nRows) nRows=declared;  // шапка авторитетнее, если в файле есть «хвост»
  if(nRows<1) throw new Error("в файле нет ни одной строки (payload "+payloadBytes+" байт, строка "+rowBytes+")");
  const rows=new Array(nRows);
  for(let i=0;i<nRows;i++){
    // конвертация Uint16 → Uint32, чтобы остальной код работал без изменений
    const src=new Uint16Array(buf, payloadOff+i*rowBytes, channels);
    const dst=new Uint32Array(channels);
    for(let k=0;k<channels;k++) dst[k]=src[k];
    const t=startedAt>0?(startedAt+i*interval):0;
    const startStr=t>0?new Date(t*1000).toISOString():"строка #"+i;
    rows[i]={ comp:"", start:startStr, real:"PT"+interval+"S", counts:dst };
  }
  return { channels, rows, calib, _aswf:hdr };
}

function energy(ch){
  if(!ST||!ST.calib) return null;
  const c = ST.calib;
  let e=0, p=1;
  for(let i=0;i<c.length;i++){ e += (c[i]||0)*p; p*=ch; }
  return e;
}

function buildGrid(){
  if(!ST) return;
  let chMin = Math.max(0, +$("chMin").value|0);
  let chMax = Math.min(ST.channels-1, +$("chMax").value|0);
  if(chMax<=chMin){ chMax = ST.channels-1; chMin=0; }
  const R = ST.rows.length;
  let C = Math.min(+$("cols").value|0, chMax-chMin+1);
  if(C<1) C=1;
  const span = (chMax-chMin+1)/C;
  const agg = new Float32Array(R*C);
  let maxv = 1;
  for(let y=0;y<R;y++){
    const counts = ST.rows[y].counts;
    for(let x=0;x<C;x++){
      const a = chMin + Math.floor(x*span), b = chMin + Math.floor((x+1)*span);
      let s=0; for(let ch=a; ch<b; ch++) s += counts[ch];
      agg[y*C+x]=s; if(s>maxv) maxv=s;
    }
  }
  GRID = { agg, R, C, maxv, chMin, chMax, span };
}

function render(){
  if(!GRID) return;
  const { agg, R, C, maxv } = GRID;
  const useLog = $("log").checked, gain = +$("gain").value;
  const denom = useLog ? Math.log1p(maxv) : maxv;
  off.width = C; off.height = R;
  const img = offctx.createImageData(C,R);
  const d = img.data;
  for(let i=0;i<R*C;i++){
    const v = agg[i];
    let t = (useLog ? Math.log1p(v) : v)/denom * gain;
    const rgb = viridis(t);
    const o=i*4; d[o]=rgb[0]; d[o+1]=rgb[1]; d[o+2]=rgb[2]; d[o+3]=255;
  }
  offctx.putImageData(img,0,0);
  const colW = +$("colW").value, rowH = +$("rowH").value;
  cv.width = C*colW; cv.height = R*rowH;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0,0, C,R, 0,0, C*colW, R*rowH);
}

function refresh(){ buildGrid(); render(); }

function detectKind(buf, name){
  if(buf.byteLength>=4){
    const u8=new Uint8Array(buf,0,4);
    if(u8[0]===0x41&&u8[1]===0x53&&u8[2]===0x57&&u8[3]===0x46) return "aswf";  // "ASWF"
    if(u8[0]===0x3C) return "n42";                                              // "<"
  }
  if(name&&/\.aswf$/i.test(name)) return "aswf";
  if(name&&/\.(n42|xml)$/i.test(name)) return "n42";
  return "n42"; // default
}

function fmtBytes(n){ if(n<1024)return n+" B"; if(n<1048576)return(n/1024).toFixed(1)+" КБ";
  if(n<1073741824)return(n/1048576).toFixed(1)+" МБ"; return(n/1073741824).toFixed(2)+" ГБ"; }

function loadBuf(buf, name){
  try{
    const kind = detectKind(buf, name);
    let extra = "";
    if(kind==="aswf"){
      ST = parseAswf(buf);
      const h = ST._aswf||{};
      const t = h.started_at>0 ? new Date(h.started_at*1000).toLocaleString() : "?";
      extra = `  •  начало: ${t}  •  интервал: ${h.interval_sec||"?"} с`;
      if(h.serial) extra += `  •  S/N: ${h.serial}`;
    } else {
      ST = parseN42(new TextDecoder("utf-8").decode(buf));
      const r0 = ST.rows[0];
      extra = `  •  интервал: ${r0?r0.real:"?"}`;
    }
    $("chMax").value = ST.channels-1;
    $("meta").textContent =
      `${name||""}  •  [${kind}, ${fmtBytes(buf.byteLength)}]  •  строк: ${ST.rows.length}` +
      `  •  каналов: ${ST.channels}${extra}` +
      `  •  калибровка: ${ST.calib?("есть ["+ST.calib.map(x=>(+x).toPrecision(4)).join(", ")+"]"):"нет (ось = каналы)"}`;
    refresh();
  }catch(e){ $("meta").textContent = "Ошибка: "+e.message; ST=null; }
}

function readFile(f){
  const rd=new FileReader();
  rd.onload=()=>loadBuf(rd.result, f.name);
  rd.onerror=()=>{ $("meta").textContent="Ошибка чтения файла: "+rd.error; };
  rd.readAsArrayBuffer(f);
}

// ---- file input + drag&drop ----
$("pick").onclick = ()=>$("file").click();
$("file").onchange = e=>{ const f=e.target.files[0]; if(f) readFile(f); };
const drop=$("drop");
["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.classList.add("hl");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.classList.remove("hl");}));
drop.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f) readFile(f); });

// ---- controls ----
["chMin","chMax","cols"].forEach(id=>$(id).addEventListener("change",refresh));
["rowH","colW"].forEach(id=>$(id).addEventListener("input",render));
$("log").addEventListener("change",render);
$("gain").addEventListener("input",render);
$("full").onclick = ()=>{ if(!ST)return; $("chMin").value=0; $("chMax").value=ST.channels-1; refresh(); };

// ---- tooltip ----
const tip=$("tip");
cv.addEventListener("mousemove",e=>{
  if(!GRID){ tip.style.display="none"; return; }
  const rect=cv.getBoundingClientRect();
  const colW=+$("colW").value, rowH=+$("rowH").value;
  const x=Math.floor((e.clientX-rect.left)/colW), y=Math.floor((e.clientY-rect.top)/rowH);
  if(x<0||y<0||x>=GRID.C||y>=GRID.R){ tip.style.display="none"; return; }
  const v=GRID.agg[y*GRID.C+x];
  const ch0=GRID.chMin+Math.floor(x*GRID.span), ch1=GRID.chMin+Math.floor((x+1)*GRID.span)-1;
  const row=ST.rows[y];
  const e0=energy(ch0), e1=energy(ch1);
  const axis = e0!=null ? `энергия: ${e0.toFixed(1)}–${e1.toFixed(1)} keV` : `каналы: ${ch0}–${ch1}`;
  tip.textContent = `строка #${y}  ${row.start}\n${axis}\nсчёты в бине: ${v}`;
  tip.style.display="block";
  tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+14)+"px";
});
cv.addEventListener("mouseleave",()=>tip.style.display="none");

// ---- optional ?src= auto-load (when served over http) ----
const src = new URLSearchParams(location.search).get("src");
if(src){ fetch(src).then(r=>r.arrayBuffer()).then(b=>loadBuf(b, src)).catch(e=>$("meta").textContent="fetch error: "+e.message); }
</script>
</body>
</html>
